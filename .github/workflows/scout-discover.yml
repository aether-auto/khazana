name: scout-discover

# Twice-weekly Source Scout: discover candidate sources (deterministic, no-AI) →
# apply → commit the updated seed registry. This is a pure-$0 CODE workflow — no
# Claude steps. Credibility appraisal now happens OUT-OF-BAND (a Claude routine,
# or manual review of data/scout/candidate-brief.md) that can write
# data/scout/appraisal.json for a later `scout apply` to consume. With no
# appraisal present, `scout apply` degrades gracefully: it prunes/repairs the
# existing registry and auto-adds nothing (candidates just wait in the queue).
#
# CADENCE: the daily pipeline auto-DISABLES dead feeds every run (reconcile), but
# only this workflow discovers REPLACEMENTS — so a weekly-only cadence could
# leave a channel thin for up to ~6 days after a mid-week disable. Runs Mon+Thu
# to halve that worst-case backfill latency. Still $0: discovery is deterministic
# with no bulk/AI network (the one Worker call is the free events fetch), so a
# second weekly run adds no API-quota risk — it just refreshes the candidate
# queue + gap brief sooner. The aggressive lever is exclusively on the ADD side;
# nothing here tightens disable criteria against healthy sources.
#
# KEPT SEPARATE from the daily pipeline (not folded in) on purpose:
#   * cadence: source discovery needs at most a few runs a week, not daily;
#   * blast radius: it commits data/sources.seed.json (a different git artifact
#     than the daily MDX), so isolating it keeps each commit-back focused.

on:
  schedule:
    # 05:00 UTC Monday and Thursday, ahead of those days' pipeline runs.
    - cron: "0 5 * * 1,4"
  workflow_dispatch:

concurrency:
  group: scout-discover
  cancel-in-progress: false

permissions:
  contents: write # commit updated sources.seed.json

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      # Scout reads curated.json + events.json; regenerate them cheaply first so
      # the gap analysis reflects current signal (no full ingest needed — recurate
      # reuses the last raw.json if present, else scout still runs on what exists).
      - name: Fetch engagement events
        run: pnpm exec tsx scripts/fetch-events.mts
        env:
          PUBLIC_WORKER_URL: ${{ vars.PUBLIC_WORKER_URL }}
          EXPORT_TOKEN: ${{ secrets.EXPORT_TOKEN }}

      # 1. discover: writes sources.pending.json + a candidate-appraisal brief.
      #    Credibility appraisal is a separate routine/manual step (see header) —
      #    it may write data/scout/appraisal.json for `scout apply` to consume.
      - name: Scout discover
        run: pnpm --filter @khazana/scout scout

      # 2. apply: prune/repair the registry, then (if an appraisal.json is
      #    present) merge verdicts and auto-add + queue → sources.json. With no
      #    appraisal present it just prunes/repairs and auto-adds nothing.
      - name: Scout apply
        run: pnpm --filter @khazana/scout scout apply

      # 3. promote the applied registry to the committed seed + commit.
      #    sources.json is gitignored; sources.seed.json is the committed registry.
      - name: Commit updated seed registry
        run: |
          git config user.name "khazana-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -f data/sources.json ]; then
            cp data/sources.json data/sources.seed.json
          fi
          git add data/sources.seed.json
          if git diff --cached --quiet; then
            echo "No source registry changes to commit."
          else
            git commit -m "chore: scout registry update $(date -u +%F) [skip ci]"
            # The daily pipeline and the Reads routine also push to main
            # concurrently; rebase onto the latest main before each push
            # attempt and retry a bounded number of times on rejection instead
            # of failing outright and silently dropping this registry update.
            push_ok=0
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main
              if git push; then
                push_ok=1
                break
              fi
              echo "Push rejected (attempt $attempt/3) — retrying after re-rebasing onto origin/main."
            done
            if [ "$push_ok" != "1" ]; then
              echo "::error::git push failed after 3 attempts (non-fast-forward) — giving up."
              exit 1
            fi
          fi
