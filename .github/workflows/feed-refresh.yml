name: feed-refresh

# High-frequency, feed-ONLY refresh: fetch behavior → ingest+curate → build →
# deploy. No generate / audio / scout / commit-back — this exists purely to keep
# the Feed surface fresh cheaply between the heavier daily pipeline runs.
#
# Full-text extraction is SKIPPED here on purpose (EXTRACT=0): this run only
# needs the fresh feed LIST, not article bodies. Deep bodies come from the daily
# pipeline (pipeline.yml, extraction ON) and the reads routine's researcher.
#
# curated.json + dist are deploy-not-commit (gitignored), so this touches no git
# history; it just rebuilds and redeploys Pages from freshly curated data.

on:
  schedule:
    # Every 3 hours. Cheap on a public repo (free unlimited minutes).
    - cron: "0 */3 * * *"
  workflow_dispatch:

# Serialize with itself; don't stack refreshes.
# Shared with pipeline.yml so Pages deploys serialize (never race the single
# github-pages slot). cancel-in-progress:false so a run is never killed mid-deploy
# (which corrupts the deployment and makes the next one fail "try again later").
concurrency:
  group: khazana-pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      LIMIT: "8"
      EXTRACT: "0" # skip full-text extraction — feed-refresh only needs the fresh list
      ALLOW_DIRECT_YOUTUBE: "1"
      REDDIT_MIN_GAP_MS: "1500"
      YT_DLP_MIN_GAP_MS: "2000"
      # yt-dlp's n-challenge solver now needs curl_cffi impersonation to avoid
      # throttling/blocks; the JS runtime (Deno) + curl-cffi extra are installed
      # in "Install ffmpeg + yt-dlp" above.
      YT_DLP_IMPERSONATE: "1"
      ARXIV_HOST_MIN_GAP_MS: "3000"
      PUBLIC_WORKER_URL: ${{ vars.PUBLIC_WORKER_URL }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}
      # Optional single-password access gate (empty = no gate). Baked at build.
      PUBLIC_SITE_GATE_HASH: ${{ vars.PUBLIC_SITE_GATE_HASH }}
      EXPORT_TOKEN: ${{ secrets.EXPORT_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      PODCASTINDEX_API_KEY: ${{ secrets.PODCASTINDEX_API_KEY }}
      PODCASTINDEX_API_SECRET: ${{ secrets.PODCASTINDEX_API_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - name: Install ffmpeg + yt-dlp (with JS runtime for n-challenge)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip install --break-system-packages -U "yt-dlp[default,curl-cffi]"   # bundles yt-dlp-ejs + curl_cffi for impersonation
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Cache ingest working caches
        uses: actions/cache@v4
        with:
          path: .cache/ingest
          key: ingest-cache-${{ github.run_id }}
          restore-keys: |
            ingest-cache-

      - run: pnpm install --frozen-lockfile

      - name: Fetch engagement events
        run: pnpm exec tsx scripts/fetch-events.mts

      - name: Ingest + curate
        run: pnpm exec tsx scripts/real-ingest.mts

      # Resilient build: a single Read that fails to render (bad prop / syntax)
      # is quarantined out of the collection so the deploy still ships with the
      # valid Reads. Aborts loudly on a systemic bug (see MAX_QUARANTINE).
      - name: Build site (resilient)
        run: pnpm tsx scripts/build-resilient.mts

      - name: Report quarantined Reads
        if: always()
        run: |
          if [ -f apps/site/dist/_quarantine-report.json ]; then
            echo "::group::Quarantine report"
            cat apps/site/dist/_quarantine-report.json
            echo "::endgroup::"
            count=$(node -e "process.stdout.write(String((require('./apps/site/dist/_quarantine-report.json').quarantined||[]).length))")
            if [ "$count" != "0" ]; then
              echo "::warning::$count Read(s) were quarantined (skipped) this build — see the quarantine report above."
            fi
          else
            echo "No quarantine report emitted."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          # GitHub Pages' publish backend intermittently returns transient poll
          # errors ("Deployment failed, try again later"). Give the status poll
          # far more patience (error_count default 10 → 60) + a longer timeout so
          # a flaky publish rides through instead of failing the whole run.
          timeout: 900000
          error_count: 60
