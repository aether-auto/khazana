name: pipeline

# The main daily cron: fetch behavior → ingest+curate → record build ledger →
# prune expired Reads → commit the pruned MDX → build → deploy to GitHub Pages.
# This is a pure-$0 CODE pipeline — no Claude / LLM steps. Reads are authored
# out-of-band by a Claude routine (subscription pool, 2×/day) that commits MDX;
# feed-refresh.yml (every 3h) rebuilds+deploys, so new Reads go live within ~3h.
# All steps are also runnable by hand (workflow_dispatch). Everything is $0:
# public-repo Actions minutes + Pages.
#
# Auth & tuning knobs come from repo Secrets/Variables — see docs/RUNBOOK.md.
# The pipeline is fail-soft where possible: a missing optional secret degrades a
# step (e.g. empty events, no enrichment) rather than breaking the run.

on:
  schedule:
    # 06:00 UTC daily. Adjust to taste; keep it off peak to be a good citizen.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Per-source item cap (LIMIT). Higher = more signal, slower."
        required: false
        default: "12"

# Only one daily pipeline in flight at a time; a newer run waits rather than
# racing the commit-back / deploy of an older one.
# Shared with feed-refresh.yml so the two never race the single github-pages
# deploy slot (the cause of intermittent "Deployment failed, try again later").
concurrency:
  group: khazana-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write # commit generated MDX + push
  pages: write # deploy to GitHub Pages
  id-token: write # OIDC for actions/deploy-pages

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # ---- scope / retention ----
      LIMIT: ${{ github.event.inputs.limit || '12' }}
      RETENTION_DAYS: "3"
      # Skip per-item full-text extraction: over the full registry it does not
      # finish inside the runner budget, and nothing on the cron path needs bodies
      # — the Feed uses the list + Gemini topics, and the Reads routine's researcher
      # does its own deep web research. (Was implicitly ON; ingest hung >74 min.)
      EXTRACT: "0"
      # ---- ingest knobs (see .superpowers/sdd/audit-orchestration.md §C) ----
      ALLOW_DIRECT_YOUTUBE: "1"
      REDDIT_MIN_GAP_MS: "1500"
      YT_DLP_MIN_GAP_MS: "2000"
      ARXIV_HOST_MIN_GAP_MS: "3000"
      # ---- build-time public origin (Variable, not secret) ----
      PUBLIC_WORKER_URL: ${{ vars.PUBLIC_WORKER_URL }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}
      # Optional single-password access gate (empty = no gate). Baked at build.
      PUBLIC_SITE_GATE_HASH: ${{ vars.PUBLIC_SITE_GATE_HASH }}
      # ---- secrets (fetch/enrich/discovery; each degrades gracefully if unset) ----
      EXPORT_TOKEN: ${{ secrets.EXPORT_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      PODCASTINDEX_API_KEY: ${{ secrets.PODCASTINDEX_API_KEY }}
      PODCASTINDEX_API_SECRET: ${{ secrets.PODCASTINDEX_API_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      # ffmpeg is required to decode podcast audio for local Whisper transcription;
      # yt-dlp fetches media for the YouTube/podcast sources.
      - name: Install ffmpeg + yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp && sudo chmod a+rx /usr/local/bin/yt-dlp

      # Transformers model cache: local Whisper (podcast STT fallback). Static key —
      # models change rarely; restore-keys lets a bumped key still reuse the prior.
      - name: Cache transformers models
        uses: actions/cache@v4
        with:
          path: .cache/transformers
          key: hf-transformers-v1
          restore-keys: |
            hf-transformers-

      # Ingest on-disk caches (ETags, extraction, transcripts). Content-addressed
      # and safe to lose; keyed by run number so each run refreshes-and-restores
      # the latest snapshot (a cold cache just does full work).
      - name: Cache ingest working caches
        uses: actions/cache@v4
        with:
          path: .cache/ingest
          key: ingest-cache-${{ github.run_id }}
          restore-keys: |
            ingest-cache-

      - run: pnpm install --frozen-lockfile

      # ---- 1. behavior signal: Worker /events → data/events.json (fail-soft) ----
      - name: Fetch engagement events
        run: pnpm exec tsx scripts/fetch-events.mts

      # ---- 2. ingest + curate (curation runs inside real-ingest) ----
      - name: Ingest + curate
        run: pnpm exec tsx scripts/real-ingest.mts

      # ---- 3. record build ledger so prune uses authoritative ages ----
      - name: Record build day
        run: pnpm exec tsx scripts/record-build-day.mts

      # ---- 4. prune: drop Reads older than the retention window ----
      # The Claude routine authors new Reads out-of-band; this daily pipeline owns
      # retention — pruning routine-authored MDX past RETENTION_DAYS.
      - name: Prune expired history
        run: pnpm exec tsx scripts/prune-history.mts --apply

      # ---- 5. commit back pruned MDX ([skip ci]) ----
      # Only removals land here (the routine commits new Reads itself); this keeps
      # the committed blog dir bounded to the retention window.
      - name: Commit generated Reads
        run: |
          git config user.name "khazana-bot"
          git config user.email "bot@users.noreply.github.com"
          git add apps/site/src/content/blog
          if git diff --cached --quiet; then
            echo "No Read changes to commit."
          else
            git commit -m "chore: daily reads $(date -u +%F) [skip ci]"
            git push
          fi

      # ---- 6. build the static site (Pagefind index inside build) ----
      - name: Build site
        run: pnpm --filter @khazana/site build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
