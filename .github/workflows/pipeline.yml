name: pipeline

# The main daily cron: fetch behavior → ingest+curate → record build ledger →
# prune expired Reads → commit the pruned MDX → build → deploy to GitHub Pages.
# This is a pure-$0 CODE pipeline — no Claude / LLM steps. Reads are authored
# out-of-band by a Claude routine (subscription pool, 2×/day) that commits MDX;
# feed-refresh.yml (every 3h) rebuilds+deploys, so new Reads go live within ~3h.
# All steps are also runnable by hand (workflow_dispatch). Everything is $0:
# public-repo Actions minutes + Pages.
#
# Auth & tuning knobs come from repo Secrets/Variables — see docs/RUNBOOK.md.
# The pipeline is fail-soft where possible: a missing optional secret degrades a
# step (e.g. empty events, no enrichment) rather than breaking the run.

on:
  schedule:
    # 06:00 UTC daily. Adjust to taste; keep it off peak to be a good citizen.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Per-source item cap (LIMIT). Higher = more signal, slower."
        required: false
        default: "12"

# Only one daily pipeline in flight at a time; a newer run waits rather than
# racing the commit-back / deploy of an older one.
# Shared with feed-refresh.yml so the two never race the single github-pages
# deploy slot (the cause of intermittent "Deployment failed, try again later").
concurrency:
  group: khazana-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write # commit generated MDX + push
  pages: write # deploy to GitHub Pages
  id-token: write # OIDC for actions/deploy-pages
  issues: write # open/update the quarantined-Reads tracking issue (see "Escalate quarantined Reads")

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # ---- scope / retention ----
      LIMIT: ${{ github.event.inputs.limit || '12' }}
      # Keep a rolling 2 weeks of Reads on the site (prune anything older).
      RETENTION_DAYS: "14"
      # Skip per-item full-text extraction: over the full registry it does not
      # finish inside the runner budget, and nothing on the cron path needs bodies
      # — the Feed uses the list + Gemini topics, and the Reads routine's researcher
      # does its own deep web research. (Was implicitly ON; ingest hung >74 min.)
      EXTRACT: "0"
      # ---- ingest knobs (see .superpowers/sdd/audit-orchestration.md §C) ----
      ALLOW_DIRECT_YOUTUBE: "1"
      REDDIT_MIN_GAP_MS: "1500"
      YT_DLP_MIN_GAP_MS: "2000"
      # yt-dlp's n-challenge solver now needs curl_cffi impersonation to avoid
      # throttling/blocks; the JS runtime (Deno) + curl-cffi extra are installed
      # in "Install ffmpeg + yt-dlp" above.
      YT_DLP_IMPERSONATE: "1"
      ARXIV_HOST_MIN_GAP_MS: "3000"
      # ---- build-time public origin (Variable, not secret) ----
      PUBLIC_WORKER_URL: ${{ vars.PUBLIC_WORKER_URL }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}
      # Optional single-password access gate (empty = no gate). Baked at build.
      PUBLIC_SITE_GATE_HASH: ${{ vars.PUBLIC_SITE_GATE_HASH }}
      # ---- secrets (fetch/enrich/discovery; each degrades gracefully if unset) ----
      EXPORT_TOKEN: ${{ secrets.EXPORT_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      PODCASTINDEX_API_KEY: ${{ secrets.PODCASTINDEX_API_KEY }}
      PODCASTINDEX_API_SECRET: ${{ secrets.PODCASTINDEX_API_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      # ffmpeg is required to decode podcast audio for local Whisper transcription;
      # yt-dlp fetches media for the YouTube/podcast sources.
      - name: Install ffmpeg + yt-dlp (with JS runtime for n-challenge)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip install --break-system-packages -U "yt-dlp[default,curl-cffi]"   # bundles yt-dlp-ejs + curl_cffi for impersonation
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      # Transformers model cache: local Whisper (podcast STT fallback). Static key —
      # models change rarely; restore-keys lets a bumped key still reuse the prior.
      - name: Cache transformers models
        uses: actions/cache@v4
        with:
          path: .cache/transformers
          key: hf-transformers-v1
          restore-keys: |
            hf-transformers-

      # Ingest on-disk caches (ETags, extraction, transcripts). Content-addressed
      # and safe to lose; keyed by run number so each run refreshes-and-restores
      # the latest snapshot (a cold cache just does full work).
      - name: Cache ingest working caches
        uses: actions/cache@v4
        with:
          path: .cache/ingest
          key: ingest-cache-${{ github.run_id }}
          restore-keys: |
            ingest-cache-

      - run: pnpm install --frozen-lockfile

      # ---- 1. behavior signal: Worker /events → data/events.json (fail-soft) ----
      - name: Fetch engagement events
        run: pnpm exec tsx scripts/fetch-events.mts

      # ---- 2. ingest + curate (curation runs inside real-ingest) ----
      - name: Ingest + curate
        run: pnpm exec tsx scripts/real-ingest.mts

      # ---- 2b. update the committed rolling feed archive (~2-week corpus) ----
      # Merge the fresh curated snapshot into data/feed/archive.json (union by id,
      # fresh wins, drop items older than ARCHIVE_WINDOW_DAYS, teaser-trim). This
      # small file is committed below so the Feed keeps ~2 weeks of past stories
      # across stateless runs instead of resetting to the latest snapshot.
      - name: Update feed archive
        run: pnpm exec tsx scripts/update-archive.mts

      # ---- 3. record build ledger so prune uses authoritative ages ----
      - name: Record build day
        run: pnpm exec tsx scripts/record-build-day.mts

      # ---- 4. prune: drop Reads older than the retention window ----
      # The Claude routine authors new Reads out-of-band; this daily pipeline owns
      # retention — pruning routine-authored MDX past RETENTION_DAYS.
      - name: Prune expired history
        run: pnpm exec tsx scripts/prune-history.mts --apply

      # ---- 5. commit back pruned MDX + the rolling feed archive ([skip ci]) ----
      # Read removals AND the refreshed data/feed/archive.json land here (the Reads
      # routine commits new Reads itself); this keeps the committed blog dir bounded
      # to the retention window and the Feed's ~2-week archive current, once/day.
      - name: Commit generated Reads
        run: |
          git config user.name "khazana-bot"
          git config user.email "bot@users.noreply.github.com"
          git add apps/site/src/content/blog data/feed/archive.json
          if git diff --cached --quiet; then
            echo "No Read changes to commit."
          else
            git commit -m "chore: daily reads $(date -u +%F) [skip ci]"
            # Other automations (scout-discover, the Reads routine) can push to
            # main concurrently; rebase onto the latest main before each push
            # attempt and retry a bounded number of times on rejection instead
            # of failing outright and silently dropping a verified Read.
            push_ok=0
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main
              if git push; then
                push_ok=1
                break
              fi
              echo "Push rejected (attempt $attempt/3) — retrying after re-rebasing onto origin/main."
            done
            if [ "$push_ok" != "1" ]; then
              echo "::error::git push failed after 3 attempts (non-fast-forward) — giving up."
              exit 1
            fi
          fi

      # ---- 6. build the static site (Pagefind index inside build) ----
      # Resilient build: a single Read that fails to render (bad prop / syntax)
      # is quarantined out of the collection so the deploy still ships with the
      # valid Reads. Aborts loudly on a systemic bug (see MAX_QUARANTINE).
      - name: Build site (resilient)
        run: pnpm tsx scripts/build-resilient.mts

      - name: Report quarantined Reads
        id: quarantine-report
        if: always()
        run: |
          if [ -f apps/site/dist/_quarantine-report.json ]; then
            echo "::group::Quarantine report"
            cat apps/site/dist/_quarantine-report.json
            echo "::endgroup::"
            count=$(node -e "process.stdout.write(String((require('./apps/site/dist/_quarantine-report.json').quarantined||[]).length))")
            echo "count=$count" >> "$GITHUB_OUTPUT"
            if [ "$count" != "0" ]; then
              echo "::error::$count Read(s) were quarantined (skipped) this build — deploy proceeds without them (build-resilient isolates one bad Read rather than blocking the site). See the quarantine report above; a tracking issue is opened/updated next."
            fi
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No quarantine report emitted."
          fi

      # Quarantine must be VISIBLE without blocking the deploy: the step above already
      # annotates the run; this opens (or updates, if one is already open) a single
      # deduplicated tracking issue listing the quarantined slugs. Never exits non-zero
      # — build-resilient's whole point is to ship the good site while isolating the bad
      # Read, and this step must preserve that.
      - name: Escalate quarantined Reads (tracking issue)
        if: always() && steps.quarantine-report.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const label = "read-quarantined";
            const title = "⚠️ Read(s) quarantined from build";
            const report = JSON.parse(fs.readFileSync("apps/site/dist/_quarantine-report.json", "utf8"));
            const quarantined = report.quarantined || [];
            const list = quarantined.map((q) => `- \`${q.slug}\`: ${q.reason}`).join("\n");
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${quarantined.length} Read(s) failed to build and were quarantined out of this deploy (the site still shipped — the deploy is NOT blocked).\n\n${list}\n\n- Workflow: ${context.workflow}\n- Run: ${runUrl}\n- Time: ${new Date().toISOString()}`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
            });
            const existing = openIssues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          # Ride through GitHub Pages' transient publish-poll errors (see
          # feed-refresh.yml): more patience instead of failing the run.
          timeout: 900000
          error_count: 60

  # A red cron otherwise just sits quietly in the Actions tab. On failure, open (or
  # update, if one is already open) a single deduplicated tracking issue so a freshness
  # break gets noticed instead of silently rotting the site's data. Scoped to only the
  # `issues: write` permission it needs — does not touch the main job's permissions.
  notify-on-failure:
    needs: run
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const label = "pipeline-failure";
            const title = `⚠️ ${context.workflow} failing`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `The \`${context.workflow}\` workflow failed.\n\n- Run: ${runUrl}\n- Time: ${new Date().toISOString()}`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
            });
            const existing = openIssues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }
