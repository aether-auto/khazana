name: pipeline

# The main daily cron: fetch behavior → ingest+curate → author Reads (Claude) →
# verify → render narration → record build ledger → prune → commit MDX →
# build → deploy to GitHub Pages. All steps are also runnable by hand
# (workflow_dispatch). Everything is $0: public-repo Actions minutes + Pages.
#
# Auth & tuning knobs come from repo Secrets/Variables — see docs/RUNBOOK.md.
# The pipeline is fail-soft where possible: a missing optional secret degrades a
# step (e.g. empty events, no enrichment) rather than breaking the run.

on:
  schedule:
    # 06:00 UTC daily. Adjust to taste; keep it off peak to be a good citizen.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Per-source item cap (LIMIT). Higher = more signal, slower."
        required: false
        default: "12"

# Only one daily pipeline in flight at a time; a newer run waits rather than
# racing the commit-back / deploy of an older one.
concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write # commit generated MDX + push
  pages: write # deploy to GitHub Pages
  id-token: write # OIDC for actions/deploy-pages

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # ---- scope / retention ----
      LIMIT: ${{ github.event.inputs.limit || '12' }}
      RETENTION_DAYS: "3"
      # ---- ingest knobs (see .superpowers/sdd/audit-orchestration.md §C) ----
      ALLOW_DIRECT_YOUTUBE: "1"
      REDDIT_MIN_GAP_MS: "1500"
      YT_DLP_MIN_GAP_MS: "2000"
      ARXIV_HOST_MIN_GAP_MS: "3000"
      # ---- narration: MP3 (universal browser compat) ----
      NARRATION_CODEC: "mp3"
      # ---- build-time public origin (Variable, not secret) ----
      PUBLIC_WORKER_URL: ${{ vars.PUBLIC_WORKER_URL }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}
      # ---- secrets (fetch/enrich/discovery; each degrades gracefully if unset) ----
      EXPORT_TOKEN: ${{ secrets.EXPORT_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      PODCASTINDEX_API_KEY: ${{ secrets.PODCASTINDEX_API_KEY }}
      PODCASTINDEX_API_SECRET: ${{ secrets.PODCASTINDEX_API_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      # ffmpeg is mandatory for render-audio (Kokoro TTS encode).
      - name: Install ffmpeg + yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp && sudo chmod a+rx /usr/local/bin/yt-dlp

      # Transformers model cache: Kokoro (~82M ONNX) + local Whisper. Static key —
      # models change rarely; restore-keys lets a bumped key still reuse the prior.
      - name: Cache transformers models
        uses: actions/cache@v4
        with:
          path: .cache/transformers
          key: hf-transformers-v1
          restore-keys: |
            hf-transformers-

      # Ingest on-disk caches (ETags, extraction, transcripts). Content-addressed
      # and safe to lose; keyed by run number so each run refreshes-and-restores
      # the latest snapshot (a cold cache just does full work).
      - name: Cache ingest working caches
        uses: actions/cache@v4
        with:
          path: .cache/ingest
          key: ingest-cache-${{ github.run_id }}
          restore-keys: |
            ingest-cache-

      - run: pnpm install --frozen-lockfile

      # ---- 1. behavior signal: Worker /events → data/events.json (fail-soft) ----
      - name: Fetch engagement events
        run: pnpm exec tsx scripts/fetch-events.mts

      # ---- 2. ingest + curate (curation runs inside real-ingest) ----
      - name: Ingest + curate
        run: pnpm exec tsx scripts/real-ingest.mts

      # ---- 3. plan: write per-slug briefs the author step consumes ----
      - name: Generate plan (briefs)
        run: pnpm --filter @khazana/generate generate plan

      # ---- 4. author: Claude Code authors research-grade MDX into the blog dir ----
      # Autonomous, prompt-driven, subscription-authed (CLAUDE_CODE_OAUTH_TOKEN).
      # Sonnet default; the writer skills escalate to Opus for Chronicle only.
      - name: Author Reads (Claude Code)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the khazana daily author running unattended in CI.
            1. Read every brief in data/generation/briefs/*.md — each is one Read
               to write (its frontmatter names the format + slug).
            2. For EACH brief, run the matching writer skill under
               .claude/skills/writers/<format>/ (chronicle | dispatch | field-notes
               | teardown | primer | build-log). First run the researcher skill to
               build a web-grounded, source-appraised dossier; every load-bearing
               claim must trace to an appraised source with >=2 independent
               corroborations where possible.
            3. Write the finished MDX to apps/site/src/content/blog/<slug>.mdx.
               Match the caliber of the existing exemplars in that directory
               (e.g. the-carrington-event.mdx). Follow STYLE.md for voice.
            4. Do NOT touch any file outside apps/site/src/content/blog/ and the
               research dossiers under data/. Do NOT commit — the workflow commits.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 60
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Bash(pnpm --filter @khazana/generate generate verify)"

      # ---- 5. verify: fail the run if a draft is malformed / ungrounded ----
      - name: Verify drafts
        run: pnpm --filter @khazana/generate generate verify

      # ---- 6. render narration (one MP3 + manifest per Read) ----
      - name: Render narration audio
        run: pnpm --filter @khazana/ingest render-audio

      # ---- 7. record build ledger so prune uses authoritative ages ----
      - name: Record build day
        run: pnpm exec tsx scripts/record-build-day.mts

      # ---- 8. prune: drop Reads + audio older than the retention window ----
      - name: Prune expired history
        run: pnpm exec tsx scripts/prune-history.mts --apply

      # ---- 9. commit back generated / removed MDX ([skip ci]) ----
      - name: Commit generated Reads
        run: |
          git config user.name "khazana-bot"
          git config user.email "bot@users.noreply.github.com"
          git add apps/site/src/content/blog
          if git diff --cached --quiet; then
            echo "No Read changes to commit."
          else
            git commit -m "chore: daily reads $(date -u +%F) [skip ci]"
            git push
          fi

      # ---- 10. build the static site (Pagefind index inside build) ----
      - name: Build site
        run: pnpm --filter @khazana/site build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
