<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="khazana — serifed-gem mark">
  <!-- Concept C: A serifed "K" letterform whose negative space is carved into
       a gem/diamond silhouette. The K is rendered as precise monoline serif
       strokes (not filled) so it stays ultra-light and editorial. The gem
       outline clips it: the letter IS the gem. Simple, legible at 20px,
       and unmistakably "khazana" (K = khazana). -->

  <!-- Gem boundary (clip path referenced as outer outline only — no separate clip
       SVG element needed; we draw the K strokes to stay within the gem naturally) -->
  <path d="M6 13 L16 4 L26 13 L16 28 Z" stroke="#ffb627" stroke-width="2" stroke-linejoin="round"/>
  <!-- girdle — the terminal baseline / optical midline of the K -->
  <path d="M6 13 H26" stroke="#ffb627" stroke-width="2" stroke-linecap="round"/>

  <!-- K LETTERFORM — monoline, centered on the gem's axis.
       The stem (vertical bar) aligns with the gem's crown-pavilion axis.
       Two arms splay diagonally — upper-right and lower-right.
       Serifs: tiny horizontal tags at the stem top/bottom (editorial feel). -->

  <!-- K stem -->
  <path d="M14 7.5 V24.5" stroke="#ffb627" stroke-width="1.5" stroke-linecap="round" opacity="0.80"/>
  <!-- K upper arm: from mid-stem up-right -->
  <path d="M14 13 L20.5 7.5" stroke="#ffb627" stroke-width="1.3" stroke-linecap="round" opacity="0.80"/>
  <!-- K lower arm: from mid-stem down-right -->
  <path d="M14 13 L20.5 21" stroke="#ffb627" stroke-width="1.3" stroke-linecap="round" opacity="0.80"/>

  <!-- serifs on stem ends (horizontal hairline tags) -->
  <path d="M12.5 7.5 H15.5" stroke="#ffb627" stroke-width="1.0" stroke-linecap="round" opacity="0.60"/>
  <path d="M12.5 24.5 H15.5" stroke="#ffb627" stroke-width="1.0" stroke-linecap="round" opacity="0.60"/>
</svg>
