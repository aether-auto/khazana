name = "khazana-events"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace "khazana-events-KV" — created 2026-07-03 via
#   pnpm --filter @khazana/worker exec wrangler kv namespace create KV
[[kv_namespaces]]
binding = "KV"
id = "117e5d2877a84f86a5eda2ee454913e1"

[vars]
# Locked to the live GitHub Pages origin (scheme+host, no path) so only the site
# can post behavior events. Was "*" during bring-up.
ALLOWED_ORIGIN = "https://aether-auto.github.io"

# EXPORT_TOKEN is a secret, NOT a var. Set it with:
#   pnpm dlx wrangler secret put EXPORT_TOKEN

# WORLD_INGEST_TOKEN is a secret, NOT a var. It authorizes only the
# world-refresh.yml Action's PUT /world/ingest mirror write — never the
# browser client. Set it with:
#   pnpm dlx wrangler secret put WORLD_INGEST_TOKEN
