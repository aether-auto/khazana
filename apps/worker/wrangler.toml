name = "khazana-events"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace "khazana-events-KV" — created 2026-07-03 via
#   pnpm --filter @khazana/worker exec wrangler kv namespace create KV
[[kv_namespaces]]
binding = "KV"
id = "117e5d2877a84f86a5eda2ee454913e1"

[vars]
# Set to the Cloudflare Pages origin once the site is deployed (P5).
ALLOWED_ORIGIN = "*"

# EXPORT_TOKEN is a secret, NOT a var. Set it with:
#   pnpm dlx wrangler secret put EXPORT_TOKEN
